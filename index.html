<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAgroCorr | Próximamente</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1f15; /* Fondo oscuro tecnológico */
            color: #ffffff;
            text-align: center;
            padding: 10% 20px;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            border-radius: 12px;
            border: 1px solid #2e7d32;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(46, 125, 50, 0.2);
        }
        h1 {
            color: #4caf50;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        h2 {
            font-weight: 300;
            color: #a5d6a7;
            font-size: 1.2em;
        }
        p {
            line-height: 1.6;
            color: #e0e0e0;
        }
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            border-top-color: #4caf50;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IAgroCorr</h1>
        <h2>Inteligencia Territorial para el NEA</h2>
        <div class="spinner"></div>
        <p><strong>Calibrando modelos geoespaciales...</strong></p>
        <p>El prototipo interactivo estará disponible muy pronto.</p>
        <p style="font-size: 0.8em; color: #888; margin-top: 30px;">Proyecto - Emprende U 2026</p>
    </div>
</body>
</html>
